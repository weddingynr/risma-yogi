<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Situs Sedang Dalam Pemeliharaan</title>
    <style>
        /* Pengaturan gaya dasar halaman */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: #333;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Pengaturan kotak pesan */
        .container {
            background-color: #ffffff;
            padding: 50px 40px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            width: 100%;
        }

        /* Ikon dan teks */
        .icon {
            font-size: 60px;
            margin-bottom: 20px;
        }
        
        h1 {
            font-size: 2.2em;
            color: #2c3e50;
            margin-top: 0;
            margin-bottom: 15px;
        }

        p {
            font-size: 1.1em;
            line-height: 1.6;
            color: #555;
            margin-bottom: 20px;
        }

        /* Gaya untuk tautan/kontak */
        .contact {
            font-size: 0.95em;
            color: #777;
            border-top: 1px solid #eee;
            padding-top: 20px;
            margin-top: 30px;
        }

        a {
            color: #3498db;
            text-decoration: none;
            font-weight: bold;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="icon">🛠️</div>
        <h1>Kami Segera Kembali!</h1>
        <p>Maaf atas ketidaknyamanan ini. Kami sedang melakukan pemeliharaan sistem untuk meningkatkan layanan dan pengalaman Anda. Situs web akan segera kembali beroperasi secara normal dalam waktu singkat.</p>
        
        <div class="contact">
            Butuh bantuan mendesak? Hubungi kami di <a href="mailto:info@domainkamu.com">info@domainkamu.com</a>
        </div>
    </div>

</body>
</html>
